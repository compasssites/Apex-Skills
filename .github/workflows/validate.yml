name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/validate_skills.py
      - run: python3 -m py_compile scripts/validate_skills.py
      - run: sh -n scripts/link_skills.sh
      - run: sh -n skills/oracle-apex-export-navigation/scripts/find_page_file.sh
      - run: sh -n skills/oracle-apex-export-navigation/scripts/emit_sqlcl_import.sh
      - run: sh -n skills/oracle-apex-safe-edit/scripts/check_guardrails.sh
